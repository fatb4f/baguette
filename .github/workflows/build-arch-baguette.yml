name: build-arch-baguette

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: build-arch-baguette-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup host
        run: |
          chmod +x scripts/setup-host.sh
          ./scripts/setup-host.sh

      - name: Build Arch rootfs tarball
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-rootfs-tarball.sh

      - name: Build Baguette image
        run: |
          chmod +x scripts/*.sh
          sudo ./scripts/make-baguette-image.sh

      - name: Validate artifacts
        run: |
          chmod +x scripts/*.sh
          ./scripts/validate-artifacts.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-baguette-image
          path: |
            out/arch-rootfs.tar
            out/arch-rootfs.tar.zst
            out/arch-baguette.img
            out/arch-baguette.img.zst
          if-no-files-found: error
